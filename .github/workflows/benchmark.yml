name: Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run synthetic benchmarks
        run: |
          mkdir -p benchmarks
          go test -run '^$' -bench Benchmark -benchmem ./internal/lean | tee benchmarks/ci-benchmark.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmarks/ci-benchmark.txt
            benchmarks/results.json
