name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download deps
        run: go mod download

      - name: gofmt check
        shell: bash
        run: |
          set -euo pipefail
          BAD=$(gofmt -l .)
          if [ -n "$BAD" ]; then
            echo "Files need gofmt:"
            echo "$BAD"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/lean-context-mode
